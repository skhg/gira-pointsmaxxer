services:
  - type: web
    name: gira-pointsmaxxer
    region: frankfurt
    runtime: node
    plan: free
    buildCommand: npm ci --ignore-scripts && npm run build
    startCommand: npm run serve
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: TRUST_PROXY
        value: "true"
