<!doctype html>
<html lang="">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gira Pointsmaxxer</title>
    <meta
      id="metaDescription"
      name="description"
      content="Independent route planner for maximising points in Lisbon's Gira bike network."
    />
    <meta id="metaApplicationName" name="application-name" content="Gira Pointsmaxxer" />
    <meta id="metaAppleWebAppTitle" name="apple-mobile-web-app-title" content="Gira Pointsmaxxer" />
    <meta name="theme-color" content="#17311f" />
    <link rel="canonical" href="https://gira-pointsmaxxer.onrender.com/" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="shortcut icon" href="./favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./site.webmanifest" />
    <meta property="og:type" content="website" />
    <meta id="metaOgSiteName" property="og:site_name" content="Gira Pointsmaxxer" />
    <meta id="metaOgTitle" property="og:title" content="Gira Pointsmaxxer" />
    <meta
      id="metaOgDescription"
      property="og:description"
      content="Independent route planner for maximising points in Lisbon's Gira bike network."
    />
    <meta property="og:url" content="https://gira-pointsmaxxer.onrender.com/" />
    <meta property="og:image" content="https://gira-pointsmaxxer.onrender.com/og-image.png" />
    <meta
      property="og:image:secure_url"
      content="https://gira-pointsmaxxer.onrender.com/og-image.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      id="metaOgImageAlt"
      property="og:image:alt"
      content="Gira Pointsmaxxer preview card with a racing-badge logo and route-planning tagline."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta id="metaTwitterTitle" name="twitter:title" content="Gira Pointsmaxxer" />
    <meta
      id="metaTwitterDescription"
      name="twitter:description"
      content="Independent route planner for maximising points in Lisbon's Gira bike network."
    />
    <meta name="twitter:image" content="https://gira-pointsmaxxer.onrender.com/og-image.png" />
    <meta
      id="metaTwitterImageAlt"
      name="twitter:image:alt"
      content="Gira Pointsmaxxer preview card with a racing-badge logo and route-planning tagline."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/app.css" />
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <label class="language-picker" for="languageSelect">
          <span id="languageLabel"></span>
          <select id="languageSelect"></select>
        </label>
      </div>

      <header class="hero" id="plannerHero">
        <div class="hero__layout">
          <div class="hero__copy">
            <p class="eyebrow" id="plannerEyebrow"></p>
            <h1 id="plannerTitle"></h1>
            <p class="lede">
              <span id="plannerLedeText"></span>
              <a class="hero__link" href="/credits" data-route="/credits" id="plannerWhatIsThisLink"></a>
            </p>
          </div>
          <div class="hero__mark">
            <img class="hero__brand-mark" src="./logo-badge.svg" alt="" aria-hidden="true" />
          </div>
        </div>
      </header>

      <header class="hero hero--secondary" id="creditsHero" hidden>
        <div class="hero__layout">
          <div class="hero__copy">
            <p class="eyebrow" id="creditsHeroEyebrow"></p>
            <h1 id="creditsHeroTitle"></h1>
            <p class="lede" id="creditsHeroLede"></p>
          </div>
          <div class="hero__mark">
            <img class="hero__brand-mark" src="./logo-badge.svg" alt="" aria-hidden="true" />
          </div>
        </div>
      </header>

      <header class="hero hero--secondary" id="statsHero" hidden>
        <div class="hero__layout">
          <div class="hero__copy">
            <p class="eyebrow" id="statsHeroEyebrow"></p>
            <h1 id="statsHeroTitle"></h1>
            <p class="lede" id="statsHeroLede"></p>
          </div>
          <div class="hero__mark">
            <img class="hero__brand-mark" src="./logo-badge.svg" alt="" aria-hidden="true" />
          </div>
        </div>
      </header>

      <main class="layout" id="plannerPage">
        <section class="panel panel--auth" id="authPanel">
          <div class="panel__header">
            <div>
              <p class="panel__eyebrow" id="authStepEyebrow"></p>
              <h2 id="authSectionTitle"></h2>
            </div>
            <button class="ghost-button" id="logoutButton" hidden></button>
          </div>

          <div class="auth-grid">
            <form id="loginForm" class="login-form" autocomplete="on">
              <label>
                <span id="emailLabel"></span>
                <input id="emailInput" name="email" type="email" autocomplete="username" />
              </label>
              <label>
                <span id="passwordLabel"></span>
                <input
                  id="passwordInput"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                />
              </label>
              <label class="checkbox-row" for="rememberEmailCheckbox">
                <input
                  id="rememberEmailCheckbox"
                  name="rememberEmail"
                  type="checkbox"
                  value="true"
                />
                <span id="rememberEmailLabel"></span>
              </label>
              <button type="submit" class="primary-button" id="loginButton"></button>
            </form>

            <div class="auth-side">
              <button class="ghost-button" id="demoButton" hidden></button>
              <p class="tiny-note" id="authSummary"></p>
            </div>
          </div>

          <details class="snapshot-disclosure">
            <summary id="snapshotDisclosureSummary"></summary>
            <div class="snapshot-details-grid">
              <div class="stat-chip">
                <span class="stat-chip__label" id="snapshotLabel"></span>
                <span class="stat-chip__value" id="snapshotSource"></span>
              </div>
              <div class="stat-chip">
                <span class="stat-chip__label" id="stationsLabel"></span>
                <span class="stat-chip__value" id="stationCount">0</span>
              </div>
              <div class="stat-chip">
                <span class="stat-chip__label" id="sessionLabel"></span>
                <span class="stat-chip__value" id="sessionStatus"></span>
              </div>
            </div>
            <div class="snapshot-actions">
              <button class="secondary-button" id="loadLiveButton" hidden disabled></button>
            </div>
          </details>
        </section>

        <section class="panel panel--controls">
          <div class="panel__header">
            <div>
              <p class="panel__eyebrow" id="controlsStepEyebrow"></p>
              <h2 id="controlsSectionTitle"></h2>
            </div>
          </div>

          <div class="controls-grid">
            <label>
              <span id="startStationLabel"></span>
              <div class="field-inline">
                <select id="startInput" disabled>
                  <option value=""></option>
                </select>
                <button
                  type="button"
                  class="field-inline__button"
                  id="currentLocationButton"
                  aria-label=""
                  title=""
                  disabled
                >
                  📍
                </button>
              </div>
            </label>
            <label>
              <span id="endStationLabel"></span>
              <select id="endInput" disabled>
                <option value=""></option>
              </select>
            </label>
            <label>
              <span id="finishTimeLabel"></span>
              <input id="finishTimeInput" type="time" step="300" />
              <small class="field-note" id="finishTimeNote"></small>
            </label>
            <label>
              <span id="speedLabel"></span>
              <input id="speedInput" type="number" min="5" max="35" step="0.5" value="15" />
            </label>
            <label>
              <span id="detourLabel"></span>
              <input id="detourInput" type="number" min="1" max="2" step="0.01" value="1.22" />
            </label>
            <label>
              <span id="overheadLabel"></span>
              <input id="overheadInput" type="number" min="0" max="5" step="0.25" value="5" />
            </label>
          </div>

          <div class="actions-row">
            <button class="primary-button" id="planButton" disabled></button>
            <p class="tiny-note" id="plannerNote"></p>
          </div>
        </section>

        <section class="panel panel--summary">
          <div class="panel__header">
            <div>
              <p class="panel__eyebrow" id="summaryStepEyebrow"></p>
              <h2 id="summarySectionTitle"></h2>
            </div>
          </div>

          <div class="summary-grid" id="summaryGrid">
            <article class="summary-card">
              <span class="summary-card__label" id="pointsLabel"></span>
              <strong class="summary-card__value" id="pointsValue">0</strong>
            </article>
            <article class="summary-card">
              <span class="summary-card__label" id="ridesLabel"></span>
              <strong class="summary-card__value" id="ridesValue">0</strong>
            </article>
            <article class="summary-card">
              <span class="summary-card__label" id="rideTimeLabel"></span>
              <strong class="summary-card__value" id="timeValue"></strong>
            </article>
            <article class="summary-card">
              <span class="summary-card__label" id="distanceLabel"></span>
              <strong class="summary-card__value" id="distanceValue"></strong>
            </article>
          </div>

          <div class="summary-details" id="summaryDetails"></div>
        </section>

        <section class="panel panel--network">
          <div class="panel__header">
            <div>
              <p class="panel__eyebrow" id="networkEyebrow"></p>
              <h2 id="networkSectionTitle"></h2>
            </div>
            <div class="legend">
              <span><i class="legend__dot legend__dot--occupied"></i><span id="legendOccupied"></span></span>
              <span><i class="legend__dot legend__dot--empty"></i><span id="legendEmpty"></span></span>
              <span><i class="legend__dot legend__dot--route"></i><span id="legendRoute"></span></span>
            </div>
          </div>

          <div class="network-stage">
            <svg id="networkSvg" viewBox="0 0 1000 700" role="img" aria-label=""></svg>
            <div class="network-tooltip" id="networkTooltip" hidden></div>
            <a
              class="network-attribution"
              id="networkAttribution"
              href="https://www.openstreetmap.org/copyright"
              target="_blank"
              rel="noopener noreferrer"
            ></a>
          </div>
        </section>

        <section class="panel panel--route">
          <div class="panel__header">
            <div>
              <p class="panel__eyebrow" id="routeEyebrow"></p>
              <h2 id="routeSectionTitle"></h2>
            </div>
          </div>
          <ol class="route-list" id="routeList"></ol>
        </section>
      </main>

      <main class="credits-page" id="creditsPage" hidden>
        <section class="panel credits-card">
          <div class="panel__header">
            <div>
              <p class="panel__eyebrow" id="creditsPanelEyebrow"></p>
              <h2 id="creditsPanelTitle"></h2>
            </div>
            <a class="ghost-button credits-back-link" href="/" data-route="/" id="backToPlannerLink"></a>
          </div>

          <div class="credits-sections" id="creditsSections"></div>
        </section>
      </main>

      <main class="stats-page" id="statsPage" hidden>
        <section class="panel stats-card">
          <div class="panel__header">
            <div>
              <p class="panel__eyebrow" id="statsPanelEyebrow"></p>
              <h2 id="statsPanelTitle"></h2>
            </div>
            <a class="ghost-button credits-back-link" href="/" data-route="/" id="statsBackToPlannerLink"></a>
          </div>

          <p class="tiny-note stats-last-updated" id="statsLastUpdated"></p>

          <div class="summary-grid stats-summary-grid" id="statsSummaryGrid"></div>

          <div class="stats-sections">
            <section class="stats-section">
              <h3 id="statsSignedInTitle"></h3>
              <div class="summary-breakdown" id="statsSignedInBreakdown"></div>
            </section>

            <section class="stats-section">
              <h3 id="statsAnonymousTitle"></h3>
              <div class="summary-breakdown" id="statsAnonymousBreakdown"></div>
            </section>

            <section class="stats-section">
              <h3 id="statsLanguageTitle"></h3>
              <div class="stats-language-grid" id="statsLanguageGrid"></div>
            </section>

            <section class="stats-section">
              <h3 id="statsTopEventsTitle"></h3>
              <ol class="route-list stats-event-list" id="statsTopEventsList"></ol>
            </section>
          </div>
        </section>
      </main>

      <footer class="app-footer" id="appFooter">
        <div class="app-footer__brand">
          <img class="app-footer__brand-mark" src="./logo-badge.svg" alt="" aria-hidden="true" />
          <span id="footerBrandName">Gira Pointsmaxxer</span>
        </div>
        <div class="app-footer__links">
          <a class="app-footer__link" href="/credits" data-route="/credits" id="footerCreditsLink"></a>
          <a class="app-footer__link" href="/stats" data-route="/stats" id="footerStatsLink"></a>
        </div>
      </footer>
    </div>

    <div class="toast" id="toast" hidden></div>
    <script src="./src/app.ts" type="module"></script>
  </body>
</html>
